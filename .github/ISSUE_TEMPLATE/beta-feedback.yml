name: Beta Feedback
description: Report testing results for a Yousign connector operation
labels: ["beta-feedback"]
body:
  - type: dropdown
    id: operation
    attributes:
      label: Operation tested
      description: Which connector operation did you test?
      options:
        - yousign-create-from-template
        - yousign-activate
        - yousign-get-status
        - yousign-cancel
        - yousign-download-document
        - yousign-download-audit-trail
        - yousign-list
        - yousign-register-webhook
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - Working
        - Partial (some issues)
        - Broken
    validations:
      required: true
  - type: dropdown
    id: beta-version
    attributes:
      label: Beta version tested
      description: Which beta version did you test?
      options:
        - 1.0.0-beta.1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Where was it tested? (e.g., customer project, internal lab, local dev)"
      placeholder: "Customer project"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Bonita version, OS, Java version
      placeholder: "Bonita 10.2.0, Windows 11, Java 17"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What was tested, steps taken, any errors encountered
    validations:
      required: true
