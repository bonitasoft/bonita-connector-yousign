name: Beta Status Tracker

on:
  issues:
    types: [opened, edited, labeled, closed]
  workflow_dispatch:

concurrency:
  group: beta-status
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  track-beta-status:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'beta-feedback'))

    steps:
      # -----------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      # -----------------------------------------------------------
      # 2. Set up Java 17 (needed for mvn versions:set at graduation)
      # -----------------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # -----------------------------------------------------------
      # 3. Extract operations from POM
      # -----------------------------------------------------------
      - name: Extract operations from POM
        id: operations
        run: |
          echo "Extracting *.def.id property values from pom.xml..."
          OPERATIONS=$(grep -oP '(?<=<)[a-z0-9-]+\.def\.id(?=>)' pom.xml \
            | sed 's/\.def\.id//' \
            | sort)
          echo "Operation property prefixes:"
          echo "$OPERATIONS"

          # Extract the actual values (canonical operation IDs)
          OP_IDS=""
          for prefix in $OPERATIONS; do
            value=$(grep -oP "(?<=<${prefix}\\.def\\.id>)[^<]+" pom.xml)
            if [ -n "$OP_IDS" ]; then
              OP_IDS="${OP_IDS},${value}"
            else
              OP_IDS="${value}"
            fi
            echo "  ${prefix} -> ${value}"
          done

          echo "operations=${OP_IDS}" >> "$GITHUB_OUTPUT"
          echo "Canonical operation IDs: ${OP_IDS}"

      # -----------------------------------------------------------
      # 4. Get current POM version and connector name
      # -----------------------------------------------------------
      - name: Get POM version and artifact ID
        id: pom
        run: |
          VERSION=$(grep -m1 -oP '(?<=<version>)[^<]+' pom.xml)
          ARTIFACT=$(grep -m1 -oP '(?<=<artifactId>)[^<]+' pom.xml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "POM version: ${VERSION}"
          echo "Artifact ID: ${ARTIFACT}"

      # -----------------------------------------------------------
      # 5. Fetch and parse beta-feedback issues
      # -----------------------------------------------------------
      - name: Fetch and parse beta-feedback issues
        id: feedback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching beta-feedback issues..."
          gh issue list --label beta-feedback --state all --json number,body --limit 200 > /tmp/issues.json

          ISSUE_COUNT=$(jq length /tmp/issues.json)
          echo "Found ${ISSUE_COUNT} beta-feedback issues"

          # Parse each issue and build a results file
          # Format: operation|result|version|issue_number
          > /tmp/parsed_feedback.txt

          for i in $(seq 0 $(( ISSUE_COUNT - 1 ))); do
            NUMBER=$(jq -r ".[$i].number" /tmp/issues.json)
            BODY=$(jq -r ".[$i].body" /tmp/issues.json)

            # Extract fields from the GitHub issue form markdown
            OPERATION=$(echo "$BODY" | sed -n '/^### Operation tested/,/^###/{/^### Operation tested/d;/^###/d;/^$/d;p;}' | head -1 | xargs)
            RESULT=$(echo "$BODY" | sed -n '/^### Result/,/^###/{/^### Result/d;/^###/d;/^$/d;p;}' | head -1 | xargs)
            BETA_VERSION=$(echo "$BODY" | sed -n '/^### Beta version tested/,/^###/{/^### Beta version tested/d;/^###/d;/^$/d;p;}' | head -1 | xargs)

            if [ -z "$OPERATION" ] || [ -z "$RESULT" ] || [ -z "$BETA_VERSION" ]; then
              echo "::warning::Could not parse feedback fields from issue #${NUMBER}"
              gh issue comment "$NUMBER" --body "Could not parse feedback fields. Please ensure the issue follows the beta-feedback template with sections: **Operation tested**, **Result**, and **Beta version tested**." || true
              continue
            fi

            echo "${OPERATION}|${RESULT}|${BETA_VERSION}|${NUMBER}" >> /tmp/parsed_feedback.txt
            echo "  Issue #${NUMBER}: operation=${OPERATION} result=${RESULT} version=${BETA_VERSION}"
          done

          echo "feedback_file=/tmp/parsed_feedback.txt" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------
      # 6. Generate beta-status.json
      # -----------------------------------------------------------
      - name: Generate beta-status.json
        id: status
        run: |
          ARTIFACT="${{ steps.pom.outputs.artifact }}"
          VERSION="${{ steps.pom.outputs.version }}"
          IFS=',' read -ra OPS <<< "${{ steps.operations.outputs.operations }}"
          FEEDBACK_FILE="/tmp/parsed_feedback.txt"

          # Start building JSON
          echo "{" > beta-status.json
          echo "  \"connector\": \"${ARTIFACT}\"," >> beta-status.json
          echo "  \"currentVersion\": \"${VERSION}\"," >> beta-status.json
          echo "  \"operations\": {" >> beta-status.json

          ALL_VALIDATED=true
          TOTAL=${#OPS[@]}
          COUNT=0

          for op in "${OPS[@]}"; do
            COUNT=$((COUNT + 1))

            # Look for a "Working" feedback line for this operation
            MATCH=""
            if [ -f "$FEEDBACK_FILE" ]; then
              MATCH=$(grep "^${op}|Working|" "$FEEDBACK_FILE" | tail -1 || true)
            fi

            if [ -n "$MATCH" ]; then
              ISSUE_NUM=$(echo "$MATCH" | cut -d'|' -f4)
              VALIDATED_VERSION=$(echo "$MATCH" | cut -d'|' -f3)
              STATUS="validated"
            else
              ISSUE_NUM="null"
              VALIDATED_VERSION="null"
              STATUS="untested"
              ALL_VALIDATED=false
            fi

            # Format JSON values (null without quotes, strings with quotes)
            if [ "$ISSUE_NUM" = "null" ]; then
              JSON_ISSUE="null"
            else
              JSON_ISSUE="${ISSUE_NUM}"
            fi
            if [ "$VALIDATED_VERSION" = "null" ]; then
              JSON_VERSION="null"
            else
              JSON_VERSION="\"${VALIDATED_VERSION}\""
            fi

            COMMA=""
            if [ "$COUNT" -lt "$TOTAL" ]; then
              COMMA=","
            fi

            echo "    \"${op}\": { \"status\": \"${STATUS}\", \"issue\": ${JSON_ISSUE}, \"version\": ${JSON_VERSION} }${COMMA}" >> beta-status.json
          done

          echo "  }" >> beta-status.json
          echo "}" >> beta-status.json

          echo "Generated beta-status.json:"
          cat beta-status.json

          echo "all_validated=${ALL_VALIDATED}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------
      # 7. Generate BETA_STATUS.md
      # -----------------------------------------------------------
      - name: Generate BETA_STATUS.md
        run: |
          ARTIFACT="${{ steps.pom.outputs.artifact }}"
          VERSION="${{ steps.pom.outputs.version }}"

          cat > BETA_STATUS.md << 'HEADER'
          # Beta Status
          HEADER

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' BETA_STATUS.md

          echo "" >> BETA_STATUS.md
          echo "**Connector:** \`${ARTIFACT}\`" >> BETA_STATUS.md
          echo "**Current Version:** \`${VERSION}\`" >> BETA_STATUS.md
          echo "" >> BETA_STATUS.md
          echo "| Operation | Status | Feedback Issue | Validated Version |" >> BETA_STATUS.md
          echo "|---|---|---|---|" >> BETA_STATUS.md

          # Read from beta-status.json to generate table rows
          OPERATIONS=$(jq -r '.operations | keys[]' beta-status.json)
          for op in $OPERATIONS; do
            STATUS=$(jq -r ".operations[\"${op}\"].status" beta-status.json)
            ISSUE=$(jq -r ".operations[\"${op}\"].issue" beta-status.json)
            VER=$(jq -r ".operations[\"${op}\"].version" beta-status.json)

            if [ "$STATUS" = "validated" ]; then
              STATUS_BADGE="validated"
              ISSUE_LINK="#${ISSUE}"
              VER_DISPLAY="\`${VER}\`"
            elif [ "$STATUS" = "released" ]; then
              STATUS_BADGE="released"
              ISSUE_LINK="#${ISSUE}"
              VER_DISPLAY="\`${VER}\`"
            else
              STATUS_BADGE="untested"
              ISSUE_LINK="-"
              VER_DISPLAY="-"
            fi

            echo "| \`${op}\` | ${STATUS_BADGE} | ${ISSUE_LINK} | ${VER_DISPLAY} |" >> BETA_STATUS.md
          done

          echo "" >> BETA_STATUS.md
          echo "---" >> BETA_STATUS.md
          echo "*Auto-generated by the beta-status workflow. Do not edit manually.*" >> BETA_STATUS.md

          echo "Generated BETA_STATUS.md:"
          cat BETA_STATUS.md

      # -----------------------------------------------------------
      # 8. Commit status files
      # -----------------------------------------------------------
      - name: Commit status files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beta-status.json BETA_STATUS.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update beta status tracking files"
            git pull --rebase origin main || true
            git push
          fi

      # -----------------------------------------------------------
      # 9. Update Confluence dashboard (placeholder)
      # -----------------------------------------------------------
      - name: Update Confluence dashboard
        run: |
          if [ -n "${{ secrets.CONFLUENCE_API_TOKEN }}" ]; then
            echo "CONFLUENCE_API_TOKEN is available. Confluence update would happen here."
            echo "TODO: Implement Confluence API call to update dashboard."
          else
            echo "CONFLUENCE_API_TOKEN not configured. Skipping Confluence update."
          fi

      # -----------------------------------------------------------
      # 10. Check graduation eligibility
      # -----------------------------------------------------------
      - name: Check graduation and create PR
        if: steps.status.outputs.all_validated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pom.outputs.version }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          # Only graduate if current version is a beta
          if [[ "$VERSION" != *"-beta"* ]]; then
            echo "Current version ${VERSION} is not a beta version. Skipping graduation."
            exit 0
          fi

          # Compute release version by stripping -beta.N suffix
          RELEASE_VERSION=$(echo "$VERSION" | sed 's/-beta\.[0-9]*//')
          BRANCH_NAME="release/graduate-to-${RELEASE_VERSION}"
          echo "All operations validated! Preparing graduation to ${RELEASE_VERSION}"

          # Check for existing graduation PR
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq 'length')
          if [ "$EXISTING_PR" -gt 0 ]; then
            echo "A graduation PR already exists for branch ${BRANCH_NAME}. Skipping."
            exit 0
          fi

          # Create graduation branch
          git checkout -b "$BRANCH_NAME"

          # Update POM version using Maven
          ./mvnw versions:set -DnewVersion="${RELEASE_VERSION}" -DgenerateBackupPoms=false -q

          # Update all *.def.version properties in pom.xml from beta to release
          sed -i "s|<\([a-z0-9-]*\)\.def\.version>${VERSION}</|<\1.def.version>${RELEASE_VERSION}</|g" pom.xml

          # Remove ' [BETA]' suffix from connectorDefinitionLabel lines in .properties files
          find src -name '*.properties' -exec sed -i 's/ \[BETA\]//g' {} +

          # Update beta-status.json: set all statuses to "released"
          OPERATIONS=$(jq -r '.operations | keys[]' beta-status.json)
          for op in $OPERATIONS; do
            jq --arg op "$op" '.operations[$op].status = "released"' beta-status.json > /tmp/bs_tmp.json && mv /tmp/bs_tmp.json beta-status.json
          done
          jq --arg v "$RELEASE_VERSION" '.currentVersion = $v' beta-status.json > /tmp/bs_tmp.json && mv /tmp/bs_tmp.json beta-status.json

          # Regenerate BETA_STATUS.md showing all released
          ARTIFACT="${{ steps.pom.outputs.artifact }}"
          cat > BETA_STATUS.md << EOF
          # Beta Status

          **Connector:** \`${ARTIFACT}\`
          **Current Version:** \`${RELEASE_VERSION}\`

          | Operation | Status | Feedback Issue | Validated Version |
          |---|---|---|---|
          EOF
          sed -i 's/^          //' BETA_STATUS.md

          for op in $OPERATIONS; do
            ISSUE=$(jq -r ".operations[\"${op}\"].issue" beta-status.json)
            VER=$(jq -r ".operations[\"${op}\"].version" beta-status.json)
            echo "| \`${op}\` | released | #${ISSUE} | \`${VER}\` |" >> BETA_STATUS.md
          done
          echo "" >> BETA_STATUS.md
          echo "---" >> BETA_STATUS.md
          echo "*Auto-generated by the beta-status workflow. Do not edit manually.*" >> BETA_STATUS.md

          # Commit and push
          git add -A
          git commit -m "chore: graduate ${ARTIFACT} from ${VERSION} to ${RELEASE_VERSION}"
          git push -u origin "$BRANCH_NAME"

          # Build PR body with evidence table
          PR_BODY="## Graduation: ${VERSION} -> ${RELEASE_VERSION}"$'\n\n'
          PR_BODY+="All operations have been validated via beta-feedback issues."$'\n\n'
          PR_BODY+="### Validation Evidence"$'\n\n'
          PR_BODY+="| Operation | Feedback Issue | Validated Version |"$'\n'
          PR_BODY+="|---|---|---|"$'\n'

          for op in $OPERATIONS; do
            ISSUE=$(jq -r ".operations[\"${op}\"].issue" beta-status.json)
            VER=$(jq -r ".operations[\"${op}\"].version" beta-status.json)
            PR_BODY+="| \`${op}\` | #${ISSUE} | \`${VER}\` |"$'\n'
          done

          PR_BODY+=$'\n'"### Changes"$'\n\n'
          PR_BODY+="- POM version: \`${VERSION}\` -> \`${RELEASE_VERSION}\`"$'\n'
          PR_BODY+="- All \`.def.version\` properties updated to \`${RELEASE_VERSION}\`"$'\n'
          PR_BODY+="- Removed \`[BETA]\` suffix from connector labels"$'\n'
          PR_BODY+="- Updated beta-status.json and BETA_STATUS.md"$'\n\n'
          PR_BODY+="**Do not auto-merge.** Review and merge manually after verification."

          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore: graduate ${ARTIFACT} to ${RELEASE_VERSION}" \
            --body "$PR_BODY"

          echo "Graduation PR created successfully."

      # -----------------------------------------------------------
      # 11. Notify Slack
      # -----------------------------------------------------------
      - name: Notify Slack on graduation
        if: steps.status.outputs.all_validated == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.pom.outputs.version }}"
          ARTIFACT="${{ steps.pom.outputs.artifact }}"

          if [[ "$VERSION" != *"-beta"* ]]; then
            echo "Not a beta version. Skipping Slack notification."
            exit 0
          fi

          RELEASE_VERSION=$(echo "$VERSION" | sed 's/-beta\.[0-9]*//')

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured. Skipping Slack notification."
            exit 0
          fi

          PAYLOAD=$(cat << EOF
          {
            "text": ":tada: *${ARTIFACT}* is ready to graduate from \`${VERSION}\` to \`${RELEASE_VERSION}\`!\nAll operations validated. A graduation PR has been created.\n<${{ github.server_url }}/${{ github.repository }}/pulls|View Pull Requests>"
          }
          EOF
          )

          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL" || echo "::warning::Failed to send Slack notification"

          echo "Slack notification sent."
