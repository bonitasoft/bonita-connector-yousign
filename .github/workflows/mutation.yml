# ============================================================================
# Mutation Testing Workflow
# ============================================================================
# Runs PIT Mutation Testing on demand or on push to main.
# Usage: Actions tab > "Mutation Testing" > "Run workflow"
# ============================================================================

name: Mutation Testing

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      mutator:
        description: 'Mutator strength'
        required: true
        default: 'STRONGER'
        type: choice
        options:
          - DEFAULTS
          - STRONGER

permissions:
  contents: read

jobs:
  mutation:
    name: PIT Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven Settings
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run Mutation Testing
        run: |
          MUTATOR="${{ github.event.inputs.mutator || 'STRONGER' }}"
          echo "Running PIT Mutation Testing with ${MUTATOR} mutators..."
          ./mvnw clean test org.pitest:pitest-maven:mutationCoverage \
            -Dpitest.mutators=${MUTATOR} \
            -Dpitest.targetClasses="com.bonitasoft.connectors.yousign.*" \
            -Dpitest.targetTests="com.bonitasoft.connectors.yousign.*Test" \
            -Dpitest.timestampedReports=false

      - name: Upload Mutation Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pit-mutation-report
          path: target/pit-reports/
          retention-days: 30

      - name: Generate Summary Report
        if: always()
        run: |
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Mutator strength: \`${{ github.event.inputs.mutator || 'STRONGER' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f target/pit-reports/index.html ]; then
            echo "### Project Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            LINE_INFO=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+/\d+' | head -1 || echo "N/A")
            MUT_INFO=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+/\d+' | head -2 | tail -1 || echo "N/A")
            STRENGTH_INFO=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+/\d+' | head -3 | tail -1 || echo "N/A")

            LINE_PCT=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+%' | head -1 || echo "N/A")
            MUT_PCT=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+%' | head -2 | tail -1 || echo "N/A")
            STRENGTH_PCT=$(sed -n '/<h3>Project Summary<\/h3>/,/<\/tbody>/p' target/pit-reports/index.html | grep -oP '\d+%' | head -3 | tail -1 || echo "N/A")

            echo "| Metric | Coverage | Details |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| Line Coverage | **${LINE_PCT}** | ${LINE_INFO} lines |" >> $GITHUB_STEP_SUMMARY
            echo "| Mutation Score | **${MUT_PCT}** | ${MUT_INFO} mutants killed |" >> $GITHUB_STEP_SUMMARY
            echo "| Test Strength | **${STRENGTH_PCT}** | ${STRENGTH_INFO} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f target/pit-reports/mutations.csv ]; then
            SURVIVED=$(grep -c ",SURVIVED," target/pit-reports/mutations.csv 2>/dev/null || echo 0)

            if [ "$SURVIVED" -gt 0 ]; then
              echo "### Top Classes with Surviving Mutants" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Class | Surviving Mutants |" >> $GITHUB_STEP_SUMMARY
              echo "|-------|-------------------|" >> $GITHUB_STEP_SUMMARY
              grep ",SURVIVED," target/pit-reports/mutations.csv | cut -d',' -f1 | sort | uniq -c | sort -rn | head -10 | \
              while read count class; do
                SHORT_CLASS=$(echo "$class" | sed 's/.*\.//')
                echo "| \`${SHORT_CLASS}\` | ${count} |" >> $GITHUB_STEP_SUMMARY
              done
            else
              echo "### All Mutants Killed!" >> $GITHUB_STEP_SUMMARY
              echo "All generated mutations were detected by the test suite." >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Download the **pit-mutation-report** artifact for the full HTML report." >> $GITHUB_STEP_SUMMARY
          echo "_Report generated by [PIT](https://pitest.org) mutation testing framework_" >> $GITHUB_STEP_SUMMARY
